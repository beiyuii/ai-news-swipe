name: AI早报数据抓取

on:
  schedule:
    # 每天 06:07 UTC+8 (即 22:07 UTC)
    - cron: '7 22 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Run fetch script
      run: python scripts/fetch-news.py
      timeout-minutes: 10
      
    - name: Check if data changed
      id: check_changes
      run: |
        if git diff --quiet data/ai-news-daily.json; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "数据无变化"
        else
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "数据有更新"
        fi
        
    - name: Commit and push if changed
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/ai-news-daily.json
        git commit -m "🤖 自动更新 AI早报数据 $(date +'%Y-%m-%d')"
        git push
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-news-daily
        path: data/ai-news-daily.json
        retention-days: 7
        
    - name: Summary
      run: |
        echo "## AI早报抓取结果" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f data/ai-news-daily.json ]; then
          COUNT=$(python3 -c "import json; print(json.load(open('data/ai-news-daily.json'))['count'])")
          echo "✅ 成功抓取 **$COUNT** 条新闻" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 预览 (前3条)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python3 -c "import json; [print(f\"{c['icon']} {c['title'][:50]}...\") for c in json.load(open('data/ai-news-daily.json'))['cards'][:3]]" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ 抓取失败，未生成数据文件" >> $GITHUB_STEP_SUMMARY
        fi
